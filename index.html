<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Charlotte — Work Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf6f8;--surface:#ffffff;--surface-2:#fceef3;
  --border:rgba(210,120,155,0.15);--border-med:rgba(210,120,155,0.28);
  --pink-deep:#c2547a;--pink-mid:#e07fa0;--pink-light:#f7c5d8;
  --pink-pale:#fde8f0;--pink-xpale:#fdf0f5;
  --text:#2a1520;--muted:#9e6b7e;--muted-2:#c8a0b2;
  --full-col:#c2547a;--half-col:#e07fa0;--gain-col:#9b3d60;
}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;font-size:15px;min-height:100vh;padding:32px 16px 80px}
.wrap{max-width:640px;margin:0 auto}
header{text-align:center;margin-bottom:36px}
.header-icon{width:52px;height:52px;background:var(--pink-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px}
h1{font-family:"Playfair Display",serif;font-size:26px;font-weight:500;color:var(--text);letter-spacing:-0.3px}
.tagline{font-size:13px;color:var(--muted);margin-top:4px}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 14px 14px}
.stat.full::after{background:var(--full-col)}
.stat.half::after{background:var(--half-col)}
.stat.total::after{background:linear-gradient(90deg,var(--full-col),var(--half-col))}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-family:"Playfair Display",serif;font-size:24px;font-weight:400;color:var(--text);line-height:1}
.stat.total .stat-value{color:var(--gain-col)}
.stat-sub{font-size:10px;color:var(--muted-2);margin-top:4px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.panel-title{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:16px}
.day-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.day-opt{border:1.5px solid var(--border-med);border-radius:12px;padding:14px 12px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface);user-select:none}
.day-opt:hover{border-color:var(--pink-mid);background:var(--pink-xpale)}
.day-opt.selected{border-color:var(--pink-deep);background:var(--pink-pale)}
.day-opt-label{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.day-opt-price{font-size:18px;font-family:"Playfair Display",serif;color:var(--pink-deep)}
.day-opt.selected .day-opt-label,.day-opt.selected .day-opt-price{color:var(--gain-col)}
.field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
input[type="date"],input[type="number"],input[type="text"]{background:var(--surface-2);border:1px solid var(--border-med);border-radius:10px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:15px;padding:11px 14px;width:100%;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input[type="date"]:focus,input[type="number"]:focus,input[type="text"]:focus{border-color:var(--pink-mid)}
.preview-pill{background:var(--pink-pale);border:1px solid var(--pink-light);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--gain-col);display:none;margin-bottom:14px}
.add-btn{width:100%;background:var(--pink-deep);color:#fff;border:none;border-radius:12px;padding:14px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.02em}
.add-btn:hover{opacity:.88}
.add-btn:active{transform:scale(.98)}
.log-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.log-title{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.clear-btn{background:none;border:1px solid var(--border-med);border-radius:8px;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:11px;padding:5px 11px;cursor:pointer;transition:all .15s}
.clear-btn:hover{border-color:#e07fa0;color:var(--pink-deep)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.table-head{display:grid;grid-template-columns:1fr 80px 70px 36px;padding:10px 14px;background:var(--pink-xpale);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.log-row{display:grid;grid-template-columns:1fr 80px 70px 36px;padding:12px 14px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s}
.log-row:last-child{border-bottom:none}
.log-row:hover{background:var(--pink-xpale)}
.log-date{font-size:14px;color:var(--text)}
.log-type{font-size:12px;padding:3px 9px;border-radius:20px;display:inline-block;font-weight:500}
.log-type.full{background:var(--pink-pale);color:var(--gain-col)}
.log-type.half{background:#fde8f0;color:var(--pink-mid)}
.log-earn{font-size:14px;font-weight:500;color:var(--gain-col);font-family:"Playfair Display",serif}
.del-btn{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:18px;padding:0 4px;transition:color .15s;line-height:1}
.del-btn:hover{color:#e07fa0}
.empty{padding:36px 14px;text-align:center;color:var(--muted-2);font-size:13px}
.invoice-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.invoice-panel-title{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:16px}
.invoice-row{display:flex;gap:10px;align-items:flex-end}
.invoice-num-group{display:flex;flex-direction:column;gap:6px;flex:0 0 120px}
.invoice-num-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.export-btn{flex:1;background:linear-gradient(135deg,var(--pink-deep),var(--pink-mid));color:#fff;border:none;border-radius:12px;padding:13px 16px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.export-btn:hover{opacity:.88}
.export-btn:active{transform:scale(.98)}
.invoice-note{font-size:11px;color:var(--muted-2);margin-top:10px;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gain-col);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;transition:transform .3s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:400px){
  .summary{grid-template-columns:1fr 1fr}
  .summary .stat:last-child{grid-column:span 2}
  .table-head,.log-row{grid-template-columns:1fr 74px 64px 30px;font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-icon">🧵</div>
    <h1>Charlotte's tracker</h1>
    <p class="tagline">Mojgan Bridal Couture</p>
  </header>
  <div class="summary">
    <div class="stat full"><div class="stat-label">Full days</div><div class="stat-value" id="s-full">0</div><div class="stat-sub">£35 each</div></div>
    <div class="stat half"><div class="stat-label">Half days</div><div class="stat-value" id="s-half">0</div><div class="stat-sub">£17.50 each</div></div>
    <div class="stat total"><div class="stat-label">Total earned</div><div class="stat-value" id="s-total">£0</div><div class="stat-sub" id="s-sub">&nbsp;</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">Log a day</div>
    <div class="day-selector">
      <div class="day-opt selected" id="opt-full" onclick="selectType('full')"><div class="day-opt-label">Full day</div><div class="day-opt-price">£35.00</div></div>
      <div class="day-opt" id="opt-half" onclick="selectType('half')"><div class="day-opt-label">Half day</div><div class="day-opt-price">£17.50</div></div>
    </div>
    <div class="field-group"><label>Date</label><input type="date" id="inp-date"/></div>
    <div class="preview-pill" id="preview">This day earns <strong id="preview-earn"></strong></div>
    <button class="add-btn" onclick="addEntry()">+ Add to log</button>
  </div>
  <div class="log-header-row">
    <div class="log-title">Log</div>
    <button class="clear-btn" onclick="clearAll()">Clear all</button>
  </div>
  <div class="table-wrap">
    <div class="table-head"><span>Date</span><span>Type</span><span>Earned</span><span></span></div>
    <div id="log-body"><div class="empty">No days logged yet</div></div>
  </div>
  <div class="invoice-panel">
    <div class="invoice-panel-title">Export as invoice</div>
    <div class="invoice-row">
      <div class="invoice-num-group"><label>Invoice no.</label><input type="text" id="inv-num" placeholder="e.g. 006" maxlength="10"/></div>
      <button class="export-btn" onclick="exportInvoice()">📄 Download invoice</button>
    </div>
    <div class="invoice-note">Downloads a Word document matching your invoice format</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const FULL_RATE=35,HALF_RATE=17.5;
let selectedType='full';
let entries=[];
try{entries=JSON.parse(localStorage.getItem('charlotte_hrs_v1'))||[];}catch{entries=[];}
function save(){try{localStorage.setItem('charlotte_hrs_v1',JSON.stringify(entries));}catch(e){}}
function selectType(t){selectedType=t;document.getElementById('opt-full').classList.toggle('selected',t==='full');document.getElementById('opt-half').classList.toggle('selected',t==='half');updatePreview();}
function updatePreview(){const earn=selectedType==='full'?FULL_RATE:HALF_RATE;document.getElementById('preview-earn').textContent='£'+earn.toFixed(2);document.getElementById('preview').style.display='block';}
function fmtDate(d){const[y,m,day]=d.split('-').map(Number);return new Date(y,m-1,day).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});}
function render(){
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const body=document.getElementById('log-body');
  if(!sorted.length){body.innerHTML='<div class="empty">No days logged yet — add one above</div>';}
  else{body.innerHTML=sorted.map((e,i)=>{
    const earn=e.type==='full'?FULL_RATE:HALF_RATE;
    const idx=entries.findIndex((x,j)=>x.date===e.date&&x.type===e.type&&j===sorted.indexOf(e));
    const realIdx=entries.indexOf(e);
    return '<div class="log-row"><span class="log-date">'+fmtDate(e.date)+'</span><span class="log-type '+e.type+'">'+(e.type==='full'?'Full':'Half')+'</span><span class="log-earn">£'+earn.toFixed(2)+'</span><button class="del-btn" onclick="del('+realIdx+')" aria-label="Remove">×</button></div>';
  }).join('');}
  const fullDays=entries.filter(e=>e.type==='full').length;
  const halfDays=entries.filter(e=>e.type==='half').length;
  const total=fullDays*FULL_RATE+halfDays*HALF_RATE;
  document.getElementById('s-full').textContent=fullDays;
  document.getElementById('s-half').textContent=halfDays;
  document.getElementById('s-total').textContent='£'+total.toFixed(2);
  document.getElementById('s-sub').textContent=total>0?'£'+(fullDays*FULL_RATE).toFixed(2)+' + £'+(halfDays*HALF_RATE).toFixed(2):'\u00a0';
}
function addEntry(){
  const date=document.getElementById('inp-date').value;
  if(!date){showToast('Please pick a date first');return;}
  entries.push({date,type:selectedType});
  save();render();
  showToast(selectedType==='full'?'Full day added ✓':'Half day added ✓');
}
function del(i){entries.splice(i,1);save();render();}
function clearAll(){if(!entries.length)return;if(confirm('Clear all entries? This cannot be undone.')){entries=[];save();render();}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── ZIP builder (no compression, stored mode — fully valid DOCX) ──────────
function num2b(n,bytes){const a=new Uint8Array(bytes);for(let i=0;i<bytes;i++){a[i]=n&0xff;n>>=8;}return a;}
function crc32(data){
  let c=0xffffffff;
  const t=new Uint32Array(256);
  for(let i=0;i<256;i++){let v=i;for(let j=0;j<8;j++)v=v&1?(v>>>1)^0xedb88320:(v>>>1);t[i]=v;}
  for(let i=0;i<data.length;i++)c=t[(c^data[i])&0xff]^(c>>>8);
  return (c^0xffffffff)>>>0;
}
function buildDocx(filesMap){
  const enc=new TextEncoder();
  const entries2=[];
  let offset=0;
  for(const[name,data]of Object.entries(filesMap)){
    const nameB=enc.encode(name);
    const crc=crc32(data);
    const lh=new Uint8Array(30+nameB.length);
    const lv=new DataView(lh.buffer);
    lv.setUint32(0,0x04034b50,true);lv.setUint16(4,20,true);lv.setUint16(6,0,true);
    lv.setUint16(8,0,true);lv.setUint16(10,0,true);lv.setUint16(12,0,true);
    lv.setUint32(14,crc,true);lv.setUint32(18,data.length,true);lv.setUint32(22,data.length,true);
    lv.setUint16(26,nameB.length,true);lv.setUint16(28,0,true);
    lh.set(nameB,30);
    entries2.push({name:nameB,crc,size:data.length,offset,lh,data});
    offset+=lh.length+data.length;
  }
  const cdOffset=offset;
  const cdParts=[];
  for(const e of entries2){
    const cd=new Uint8Array(46+e.name.length);
    const dv=new DataView(cd.buffer);
    dv.setUint32(0,0x02014b50,true);dv.setUint16(4,20,true);dv.setUint16(6,20,true);
    dv.setUint16(8,0,true);dv.setUint16(10,0,true);dv.setUint16(12,0,true);dv.setUint16(14,0,true);
    dv.setUint32(16,e.crc,true);dv.setUint32(20,e.size,true);dv.setUint32(24,e.size,true);
    dv.setUint16(28,e.name.length,true);dv.setUint16(30,0,true);dv.setUint16(32,0,true);
    dv.setUint16(34,0,true);dv.setUint16(36,0,true);dv.setUint32(38,0,true);dv.setUint32(42,e.offset,true);
    cd.set(e.name,46);
    cdParts.push(cd);
  }
  const cdSize=cdParts.reduce((s,c)=>s+c.length,0);
  const eocd=new Uint8Array(22);
  const ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(4,0,true);ev.setUint16(6,0,true);
  ev.setUint16(8,entries2.length,true);ev.setUint16(10,entries2.length,true);
  ev.setUint32(12,cdSize,true);ev.setUint32(16,cdOffset,true);ev.setUint16(20,0,true);
  const parts=[...entries2.flatMap(e=>[e.lh,e.data]),...cdParts,eocd];
  const total=parts.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);
  let pos=0;
  for(const p of parts){out.set(p,pos);pos+=p.length;}
  return out;
}

function exportInvoice(){
  if(!entries.length){showToast('No entries to invoice');return;}
  const invNum=document.getElementById('inv-num').value.trim()||'001';
  const fullDays=entries.filter(e=>e.type==='full').length;
  const halfDays=entries.filter(e=>e.type==='half').length;
  const fullTotal=fullDays*FULL_RATE;
  const halfTotal=halfDays*HALF_RATE;
  const grand=fullTotal+halfTotal;
  const fmt=n=>'\u00a3'+n.toFixed(2);

  // Pad numbers to same length as placeholder to avoid breaking XML structure
  function padded(val,placeholder){
    const s=String(val);
    return s.length<placeholder.length?s+' '.repeat(placeholder.length-s.length):s;
  }

  let xml=DOC_XML_TPL
    .replace('INVNUM000', padded(invNum,'INVNUM000'))
    .replace('FULLDAYS0', padded(String(fullDays),'FULLDAYS0'))
    .replace('HALFDAYS0', padded(String(halfDays),'HALFDAYS0'))
    .replace('FULLTOT00', padded(fmt(fullTotal),'FULLTOT00'))
    .replace('HALFTOT00', padded(fmt(halfTotal),'HALFTOT00'))
    .replace(/GRANDTOT0/g, padded(fmt(grand),'GRANDTOT0'));

  const enc=new TextEncoder();
  const filesMap={};
  // Add static files
  for(const[name,b64] of Object.entries(STATIC_FILES)){
    filesMap[name]=b64ToU8(b64);
  }
  // Add patched document.xml
  filesMap['word/document.xml']=enc.encode(xml);

  const zip=buildDocx(filesMap);
  const blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Charlotte_Gibbons_Invoice_'+invNum+'.docx';
  a.click();
  showToast('Invoice downloaded ✓');
}

function b64ToU8(b64){
  const bin=atob(b64);
  const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
  return u8;
}

updatePreview();
const t=new Date();
document.getElementById('inp-date').value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
render();
